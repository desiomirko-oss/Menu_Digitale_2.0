<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal Dynamic PWA</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link id="dynamic-font" rel="stylesheet">
    <style>
        :root { --primary-color: #000; --bg-app: #fff; }
        body { margin: 0; transition: opacity 0.5s; font-family: sans-serif; background: var(--bg-app); }
        #loader { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            display:flex; justify-content:center; align-items:center; background:#fff; z-index:999; 
        }
        /* Struttura Multi-Livello */
        .category-header { padding: 20px; font-weight: bold; position: sticky; top:0; z-index:10; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; padding: 15px; }
        .list-container { display: flex; flex-direction: column; gap: 10px; padding: 15px; }
        .card { padding: 15px; border-radius: 12px; transition: transform 0.2s; position: relative; overflow: hidden; }
        .card:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="loader"><h1>Caricamento Divino...</h1></div>
<div id="google_translate_element" style="display:none;"></div>

<header id="main-header"></header>
<nav id="filters"></nav>
<main id="app-render"></main>

<script>
/**
 * MOTORE LOGICO SUPREMO
 */
const urlParams = new URLSearchParams(window.location.search);
const SHEET_ID = urlParams.get('id'); // Prende l'ID dall'URL ?id=...

if (!SHEET_ID) {
    document.body.innerHTML = "<h1>Errore: ID Cliente non specificato.</h1>";
}

// URL di pubblicazione Google (Tab 0 e Tab 1 solitamente Config e Menu)
// Nota: gid=0 è il primo foglio, gid=XXXXXXXX è il secondo.
const CONFIG_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/pub?gid=0&output=csv`;
const MENU_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/pub?gid=1832483838&output=csv`; // Sostituisci GID con quello del foglio Menu

async function initApp() {
    try {
        const configData = await fetchCSV(CONFIG_URL);
        const menuData = await fetchCSV(MENU_URL);
        
        applyConfig(configData);
        renderMenu(menuData, configData);
        
        document.getElementById('loader').style.display = 'none';
        autoTranslate();
    } catch (e) {
        console.error("Errore nell'ascesa:", e);
    }
}

function fetchCSV(url) {
    return new Promise((resolve) => {
        Papa.parse(`${url}&cachebuster=${new Date().getTime()}`, { // Pulizia Cache Automatica
            download: true,
            header: true,
            complete: (results) => resolve(results.data)
        });
    });
}

function applyConfig(config) {
    const cfg = {};
    config.forEach(row => cfg[row.Parametro] = row.Valore);
    
    const root = document.documentElement;
    // Applicazione Font
    if(cfg.Font_Main) {
        document.getElementById('dynamic-font').href = `https://fonts.googleapis.com/css2?family=${cfg.Font_Main.replace(' ', '+')}&display=swap`;
        document.body.style.setProperty('font-family', cfg.Font_Main);
    }
    
    // Applicazione Colori e Stili
    root.style.setProperty('--bg-app', cfg.App_Bg_Color || '#fff');
    document.body.style.color = cfg.Logo_Text_Color || '#000';
    
    // Header
    const header = document.getElementById('main-header');
    header.innerHTML = cfg.Logo_Type === 'TEXT' ? `<h1>${cfg.Logo_Text}</h1>` : `<img src="${cfg.Logo_URL}" style="width:100px">`;
    header.style.textAlign = 'center';
}

function renderMenu(data, config) {
    const container = document.getElementById('app-render');
    const cfg = {}; config.forEach(row => cfg[row.Parametro] = row.Valore);
    
    container.className = cfg.Cat_Layout === 'GRID' ? 'grid-container' : 'list-container';
    
    // Logica multi-livello: raggruppamento per Categoria
    const categories = [...new Set(data.map(item => item.Categoria))];
    
    categories.forEach(cat => {
        const catSection = document.createElement('div');
        catSection.innerHTML = `<div class="category-header" style="background:${cfg.Filter_Active_Color}">${cat}</div>`;
        
        const items = data.filter(i => i.Categoria === cat && i.Attivo === 'SI');
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.background = cfg.Card_Bg;
            if(cfg.Show_Cards === 'SI') card.style.boxShadow = '0 4px 15px rgba(0,0,0,0.1)';
            
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <div>
                        <strong class="translatable">${item.Nome_IT}</strong>
                        <p class="translatable" style="font-size:0.8rem; opacity:0.8">${item.Desc_IT}</p>
                        <small style="color:red">${item.Allerg_IT || ''}</small>
                    </div>
                    <div style="font-weight:bold">€${item.Prezzo}</div>
                </div>
            `;
            catSection.appendChild(card);
        });
        container.appendChild(catSection);
    });
}

// TRADUZIONE DIVINA IN 10+ LINGUE
function autoTranslate() {
    const userLang = navigator.language.split('-')[0];
    if (userLang === 'it') return;

    let script = document.createElement('script');
    script.src = `https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit`;
    document.head.appendChild(script);

    window.googleTranslateElementInit = () => {
        new google.translate.TranslateElement({
            pageLanguage: 'it',
            includedLanguages: 'en,fr,de,es,pt,ru,zh,ja,ar,hi',
            autoDisplay: true
        }, 'google_translate_element');
        
        // Forza la traduzione automatica senza interazione
        setTimeout(() => {
            const select = document.querySelector('.goog-te-combo');
            if(select) {
                select.value = userLang;
                select.dispatchEvent(new Event('change'));
            }
        }, 1000);
    };
}

// REGISTRAZIONE SERVICE WORKER (PWA)
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

initApp();
</script>
</body>
</html>
