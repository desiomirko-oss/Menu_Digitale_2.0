<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Menu Master V6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Defaults prevent crash */
            --header-h: 100px;
            --back-size: 40px;
            --back-bg: rgba(255,255,255,0.5);
            --back-color: #000;
            --back-top: 20px;
            --back-left: 15px;
        }

        body {
            background-color: var(--app-bg, #f3f4f6);
            background-image: var(--app-bg-img, none);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .glass-header {
            background: var(--header-bg, rgba(255,255,255,0.8));
            height: var(--header-h);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #back-button {
            position: absolute;
            top: var(--back-top);
            left: var(--back-left);
            width: var(--back-size);
            height: var(--back-size);
            background: var(--back-bg);
            color: var(--back-color);
            display: none; /* Hidden on Home */
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            z-index: 110;
            transition: all 0.2s ease;
        }

        #back-button.active { display: flex; }

        #main-content {
            /* Calcolo automatico dello spazio per non finire sotto l'header */
            padding-top: calc(var(--header-h) + 15px);
        }

        .dynamic-subtitle {
            margin-top: var(--sub-mt, 10px);
            font-family: var(--sub-font);
            color: var(--sub-color);
            font-size: var(--sub-size);
            text-align: var(--sub-align);
        }

        .page-transition { display: none; }
        .active-page { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header id="main-header" class="glass-header px-6">
        <button id="back-button" onclick="goBack()">
            <div id="back-icon-container"></div>
        </button>
        <div id="header-content" class="w-full">
            <div id="logo-container"></div>
            <div id="subtitle-container" class="dynamic-subtitle"></div>
        </div>
    </header>

    <main id="main-content" class="px-4 pb-12 max-w-md mx-auto relative">
        <section id="page-macro" class="page-transition active-page space-y-4"></section>
        <section id="page-categories" class="page-transition space-y-4"></section>
        <section id="page-items" class="page-transition space-y-6"></section>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const SHEET_ID = urlParams.get('id'); 
        let appConfig = {};
        let navigationStack = ['page-macro'];

        async function init() {
            if (!SHEET_ID) return;
            await fetchConfig();
            applyConfig();
            // ... (Resto della logica fetchMenu come prima)
        }

        async function fetchConfig() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=config`;
            const response = await fetch(url);
            const csv = await response.text();
            csv.split('\n').slice(1).forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if(cols.length >= 2) {
                    appConfig[cols[0].replace(/"/g, '').trim()] = cols[1].replace(/"/g, '').replace(/;/g, ',').trim();
                }
            });
        }

        function applyConfig() {
            const root = document.documentElement;
            
            // Header & Layout
            root.style.setProperty('--header-h', appConfig.Header_Height || '100px');
            root.style.setProperty('--header-bg', appConfig.Header_BgColor);

            // Back Button
            root.style.setProperty('--back-size', appConfig.Back_Btn_Size);
            root.style.setProperty('--back-bg', appConfig.Back_Btn_Bg);
            root.style.setProperty('--back-color', appConfig.Back_Btn_Color);
            root.style.setProperty('--back-top', appConfig.Back_Btn_Pos_Top);
            root.style.setProperty('--back-left', appConfig.Back_Btn_Pos_Left);

            const iconCont = document.getElementById('back-icon-container');
            const symbol = appConfig.Back_Btn_Symbol?.toLowerCase();
            if(symbol === 'chevron') {
                iconCont.innerHTML = '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>';
            } else if(symbol === 'arrow') {
                iconCont.innerHTML = '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>';
            } else {
                iconCont.innerHTML = '<span><</span>';
            }

            // Logo & Subtitle
            const logoCont = document.getElementById('logo-container');
            logoCont.className = `w-full flex justify-${appConfig.Logo_Align || 'center'}`;
            if(appConfig.Logo_Type === 'image') {
                logoCont.innerHTML = `<img src="${appConfig.Logo_Image_URL}" style="height:${appConfig.Logo_Image_Size}">`;
            } else {
                logoCont.innerHTML = `<h1 style="color:${appConfig.Logo_Text_Color}; font-size:${appConfig.Logo_Text_Size}; font-weight:${appConfig.Logo_Text_Bold === 'TRUE' ? 'bold' : 'normal'}">${appConfig.Logo_Text}</h1>`;
            }

            document.getElementById('subtitle-container').innerText = appConfig.Subtitle_Text;
            root.style.setProperty('--sub-mt', appConfig.Subtitle_Margin_Top);
        }

        // ... (Logica di navigazione e rendering menu omessa per brevità, resta invariata)
        init();
    </script>
</body>
</html>
