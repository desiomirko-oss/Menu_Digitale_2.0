<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Digitale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --app-bg: #f9fafb;
            --header-bg: rgba(255, 255, 255, 0.95);
            --back-bg: rgba(255, 255, 255, 0.9);
            --back-color: #4f46e5;
            --macro-h: 180px;
        }

        body {
            background-color: var(--app-bg);
            background-image: var(--app-bg-img, none);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            margin: 0;
            overscroll-behavior-y: none; 
        }

        /* HEADER BLINDATO */
        #main-header {
            background: var(--header-bg);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 15px 20px;
            min-height: 80px;
            transition: all 0.3s ease;
        }

        /* TASTO INDIETRO */
        #back-button {
            position: fixed;
            left: 15px;
            width: 44px;
            height: 44px;
            background: var(--back-bg);
            color: var(--back-color);
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 1000;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.1s ease;
        }
        #back-button:active { transform: scale(0.9); }
        #back-button.active { display: flex; }

        /* MACRO CARD */
        .macro-card {
            height: var(--macro-h);
            border-radius: 1.25rem;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }
        .macro-card:active { transform: scale(0.96); }
        .macro-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,0.4)); }

        /* FOTO PIATTO */
        .item-photo {
            width: 80px;
            height: 80px;
            border-radius: 0.75rem;
            object-fit: cover;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .page-content { animation: pageIn 0.3s ease-out forwards; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--back-color); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header id="main-header">
        <div id="logo-container" class="w-full flex items-center"></div>
        <div id="subtitle-container"></div>
        <div id="level-title-inside" style="display: none; letter-spacing: 0.1em; text-transform: uppercase;"></div>
    </header>

    <button id="back-button" onclick="goBack()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>

    <main id="main-content" class="px-5 pb-10 max-w-md mx-auto relative">
        
        <div id="loading-screen" class="flex flex-col items-center pt-20">
            <div class="loader mb-4"></div>
            <p class="text-gray-400 text-sm uppercase tracking-widest">Sincronizzazione...</p>
        </div>

        <div id="level-title-outside" style="display: none; letter-spacing: 0.1em; text-transform: uppercase;" class="mb-4"></div>

        <section id="page-macro" style="display: none;">
            <div id="macro-layout-container" class="page-content"></div>
        </section>

        <section id="page-categories" style="display: none;" class="page-content space-y-4"></section>

        <section id="page-items" style="display: none;" class="page-content space-y-5"></section>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const SHEET_ID = urlParams.get('id'); 
        let appConfig = {};
        let fullData = [];
        let navigationStack = ['page-macro'];

        async function init() {
            if (!SHEET_ID) {
                document.getElementById('loading-screen').innerHTML = "<div class='text-center pt-20 text-red-500 font-bold'>ID Cliente Mancante</div>";
                return;
            }
            await fetchConfig();
            applyConfig();
            await fetchMenu();
        }

        async function fetchConfig() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=config`;
            try {
                const response = await fetch(url);
                const csv = await response.text();
                csv.split('\n').slice(1).forEach(row => {
                    if(row.trim() === '') return;
                    
                    // Regex avanzata per rispettare il testo tra virgolette nel CSV
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length >= 2) {
                        // Rimuove solo le virgolette iniziali e finali, rispettando il contenuto
                        const key = cols[0].replace(/^"|"$/g, '').trim();
                        // Ricostruisce il valore nel caso contenga virgole vere
                        const val = cols.slice(1).join(',').replace(/^"|"$/g, '').replace(/;/g, ',').trim();
                        appConfig[key] = val;
                    }
                });
            } catch(e) { console.error("Errore Lettura Config"); }
        }

        function applyConfig() {
            const root = document.documentElement;
            
            root.style.setProperty('--header-bg', appConfig.Header_BgColor || 'rgba(255, 255, 255, 0.95)');
            root.style.setProperty('--app-bg', appConfig.Bg_Color || '#f9fafb');
            if(appConfig.Bg_Type === 'image') root.style.setProperty('--app-bg-img', `url('${appConfig.Bg_Image_URL}')`);
            
            root.style.setProperty('--macro-h', appConfig.Macro_Height || '180px');
            root.style.setProperty('--back-bg', appConfig.Back_Btn_Bg || '#fff');
            root.style.setProperty('--back-color', appConfig.Back_Btn_Color || '#000');

            const backBtn = document.getElementById('back-button');
            const pos = (appConfig.Back_Btn_Position || 'center').toLowerCase().trim();
            const hHeight = parseInt(appConfig.Header_Height || '120');
            if (pos === 'center') backBtn.style.top = `calc(${hHeight}px / 2 - 22px)`;
            else if (pos === 'bottom') backBtn.style.top = `calc(${hHeight}px - 55px)`;
            else if (pos === 'outside') backBtn.style.top = `calc(${hHeight}px + 15px)`;

            // --- MOTORE LOGO BLINDATO ---
            const logoCont = document.getElementById('logo-container');
            logoCont.innerHTML = ''; 
            logoCont.className = `w-full flex justify-${(appConfig.Logo_Align || 'center').toLowerCase().trim()}`;
            
            const isImage = (appConfig.Logo_Type || '').toLowerCase().trim() === 'image';
            const hasImageUrl = appConfig.Logo_Image_URL && appConfig.Logo_Image_URL.trim() !== '' && appConfig.Logo_Image_URL !== 'undefined';

            if (isImage && hasImageUrl) {
                logoCont.innerHTML = `<img src="${appConfig.Logo_Image_URL}" style="height:${appConfig.Logo_Image_Size || '60px'}; object-fit:contain;">`;
                document.title = "Menu Digitale"; // Fallback titolo browser
            } else {
                // Lettura sicura del testo
                let customText = appConfig.Logo_Text;
                if (!customText || customText.toLowerCase() === 'undefined' || customText.trim() === '') {
                    customText = 'Menu Digitale'; 
                }
                
                const isBold = (appConfig.Logo_Text_Bold || '').toUpperCase().trim() === 'FALSE' ? 'normal' : 'bold';
                
                logoCont.innerHTML = `<h1 style="color:${appConfig.Logo_Text_Color || '#000'}; font-size:${appConfig.Logo_Text_Size || '24px'}; font-weight:${isBold}; margin:0; line-height:1; font-family:${appConfig.Logo_Text_Font || 'sans-serif'};">${customText}</h1>`;
                
                // Aggiorna anche il tab del browser
                document.title = customText;
            }
            
            // Sottotitolo (Con Toggle Sicuro)
            const sub = document.getElementById('subtitle-container');
            if((appConfig.Subtitle_Show || '').toUpperCase().trim() === 'FALSE') {
                sub.style.display = 'none';
            } else {
                sub.style.display = 'block';
                const subText = (appConfig.Subtitle_Text && appConfig.Subtitle_Text !== 'undefined') ? appConfig.Subtitle_Text : '';
                sub.innerText = subText;
                sub.style.cssText = `color:${appConfig.Subtitle_Color || '#666'}; font-size:${appConfig.Subtitle_Size || '14px'}; margin-top:${appConfig.Subtitle_Margin_Top || '5px'}; text-align:${appConfig.Subtitle_Align || 'center'}; font-family:${appConfig.Subtitle_Font || 'sans-serif'};`;
            }

            // Sotto-Sottotitolo
            const levelStyle = `color:${appConfig.Level_Title_Color || '#4f46e5'}; font-size:${appConfig.Level_Title_Size || '16px'}; font-weight:${(appConfig.Level_Title_Bold || '').toUpperCase() === 'FALSE' ? 'normal' : 'bold'}; text-align:${appConfig.Level_Title_Align || 'center'}; font-family:${appConfig.Level_Title_Font || 'sans-serif'}; margin-top: 8px; display: none;`;
            document.getElementById('level-title-inside').style.cssText = levelStyle;
            document.getElementById('level-title-outside').style.cssText = levelStyle + ' margin-top: 0px; margin-bottom: 20px;'; 
        }

        function autoAdjustPadding() {
            setTimeout(() => {
                const header = document.getElementById('main-header');
                const mainContent = document.getElementById('main-content');
                if(header && mainContent) {
                    mainContent.style.paddingTop = `calc(${header.offsetHeight}px + 20px)`;
                }
            }, 50); 
        }

        async function fetchMenu() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=menu`;
            try {
                const response = await fetch(url);
                const csv = await response.text();
                fullData = csv.split('\n').slice(1).filter(r => r.trim() !== '').map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
                    return { 
                        macro: c[0], cat: c[1], name: c[2], desc: c[3], allerg: c[4], 
                        price: c[5], gf: c[6], vegan: c[7], veg: c[8], noalc: c[9], 
                        active: c[10], photoUrl: c[11], model3d: c[12] 
                    };
                }).filter(i => i.macro && (i.active || '').toUpperCase() !== 'FALSE'); 
                
                document.getElementById('loading-screen').style.display = 'none';
                renderLevel1();
            } catch (e) {
                document.getElementById('loading-screen').innerHTML = "<div class='text-center pt-20 text-red-500'>Nessun menu trovato.</div>";
            }
        }

        function renderLevel1() {
            const layoutContainer = document.getElementById('macro-layout-container');
            const macros = [...new Set(fullData.map(i => i.macro))];
            
            const isGrid = (appConfig.Macro_Layout || 'grid').toLowerCase().trim() === 'grid';
            layoutContainer.className = `page-content ${isGrid ? 'grid grid-cols-2 gap-4' : 'flex flex-col space-y-6'}`;
            layoutContainer.innerHTML = '';

            macros.forEach(m => {
                const imgKey = `Macro_Img_${m}`;
                const imgUrl = appConfig[imgKey];
                const bg = (imgUrl && imgUrl !== 'undefined') ? `url('${imgUrl}')` : 'linear-gradient(135deg, #cbd5e1, #f1f5f9)'; 
                const tPos = (appConfig.Macro_Text_Pos || 'center').toLowerCase().trim(); 

                let html = '';
                if(tPos === 'outside') {
                    html = `<div onclick="renderLevel2('${m.replace(/'/g, "\\'")}')" class="flex flex-col cursor-pointer"><div class="macro-card w-full" style="background-image:${bg}"></div><span class="text-center mt-2 font-bold text-gray-800 uppercase tracking-wide text-sm">${m}</span></div>`;
                } else {
                    html = `<div onclick="renderLevel2('${m.replace(/'/g, "\\'")}')" class="macro-card w-full flex items-center justify-center cursor-pointer" style="background-image:${bg}"><div class="macro-overlay"></div><span class="relative z-10 text-white font-extrabold text-xl uppercase tracking-widest" style="text-shadow: 0 2px 4px rgba(0,0,0,0.6);">${m}</span></div>`;
                }
                layoutContainer.innerHTML += html;
            });
            showPage('page-macro');
        }

        function renderLevel2(mName) {
            const container = document.getElementById('page-categories');
            const cats = [...new Set(fullData.filter(i => i.macro === mName).map(i => i.cat))];
            
            container.innerHTML = ''; 
            cats.forEach(c => {
                container.innerHTML += `
                    <div onclick="renderLevel3('${mName.replace(/'/g, "\\'")}', '${c.replace(/'/g, "\\'")}')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center cursor-pointer active:bg-gray-50 mb-3">
                        <span class="font-bold text-gray-800 text-lg">${c}</span>
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </div>`;
            });
            navigationStack.push('page-categories');
            showPage('page-categories', mName);
        }

        function renderLevel3(mName, cName) {
            const container = document.getElementById('page-items');
            const items = fullData.filter(i => i.cat === cName && i.macro === mName);
            
            container.innerHTML = `<div class="mb-4 text-center mt-2"><span class="text-[11px] font-black text-gray-400 uppercase tracking-[0.2em] bg-gray-200/50 px-3 py-1 rounded-full">${cName}</span></div>`;
            
            items.forEach(i => {
                let badges = '';
                if(i.gf && i.gf.toUpperCase() === 'TRUE') badges += `<span class="bg-amber-100 text-amber-700 text-[10px] font-bold px-2 py-0.5 rounded-full mr-1">Senza Glutine</span>`;
                if(i.vegan && i.vegan.toUpperCase() === 'TRUE') badges += `<span class="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-0.5 rounded-full mr-1">Vegano</span>`;
                if(i.veg && i.veg.toUpperCase() === 'TRUE') badges += `<span class="bg-lime-100 text-lime-700 text-[10px] font-bold px-2 py-0.5 rounded-full mr-1">Vegetariano</span>`;
                
                let allergensHTML = '';
                if(i.allerg && i.allerg !== 'undefined' && i.allerg.trim() !== '') {
                    allergensHTML = `<p class="text-[10px] text-red-400 mt-1">Allergeni: ${i.allerg}</p>`;
                }

                let photoHTML = '';
                if(i.photoUrl && i.photoUrl !== 'undefined' && i.photoUrl.trim() !== '') {
                    photoHTML = `<img src="${i.photoUrl}" alt="${i.name}" class="item-photo shrink-0 ml-3">`;
                }

                container.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex justify-between items-stretch gap-2 mb-4">
                        <div class="flex flex-col justify-center flex-grow">
                            <div class="flex justify-between items-start gap-2">
                                <h3 class="font-extrabold text-gray-900 text-lg leading-tight">${i.name}</h3>
                                <span class="font-black text-indigo-600 bg-indigo-50 px-2 py-1 rounded whitespace-nowrap">${i.price}</span>
                            </div>
                            <p class="text-sm text-gray-500 leading-relaxed font-medium mt-1">${i.desc}</p>
                            ${allergensHTML}
                            <div class="mt-2 flex flex-wrap">${badges}</div>
                        </div>
                        ${photoHTML}
                    </div>`;
            });
            navigationStack.push('page-items');
            showPage('page-items', mName);
        }

        // MOTORE DI NAVIGAZIONE
        function showPage(p, levelTitle = '') {
            document.getElementById('page-macro').style.display = 'none';
            document.getElementById('page-categories').style.display = 'none';
            document.getElementById('page-items').style.display = 'none';
            document.getElementById(p).style.display = 'block';
            
            const contentDiv = document.querySelector(`#${p} .page-content`) || document.getElementById(p);
            contentDiv.style.animation = 'none';
            contentDiv.offsetHeight; 
            contentDiv.style.animation = 'pageIn 0.3s ease-out forwards';

            const backBtn = document.getElementById('back-button');
            const titleInside = document.getElementById('level-title-inside');
            const titleOutside = document.getElementById('level-title-outside');
            
            titleInside.style.display = 'none';
            titleOutside.style.display = 'none';

            if(p === 'page-macro') {
                backBtn.classList.remove('active');
                document.body.style.overflow = 'auto'; 
            } else {
                backBtn.classList.add('active');
                document.body.style.overflow = 'auto';
                
                if((appConfig.Level_Title_Show || '').toUpperCase().trim() !== 'FALSE') {
                    if((appConfig.Level_Title_Position || 'inside').toLowerCase().trim() === 'outside') {
                        titleOutside.style.display = 'block';
                        titleOutside.innerText = levelTitle;
                    } else {
                        titleInside.style.display = 'block';
                        titleInside.innerText = levelTitle;
                    }
                }
            }

            autoAdjustPadding();
            window.scrollTo({top: 0, behavior: 'instant'});
        }

        function goBack() { 
            if(navigationStack.length > 1) {
                navigationStack.pop(); 
                const prev = navigationStack[navigationStack.length-1];
                let titleToRestore = '';
                if(prev === 'page-categories') {
                    const firstMatch = fullData.find(i => i.cat === document.querySelector('#page-categories div span').innerText);
                    if(firstMatch) titleToRestore = firstMatch.macro;
                }
                showPage(prev, titleToRestore);
            }
        }

        init();
    </script>
</body>
</html>
