<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Pro v4</title>
    <style>
        :root { --p: #000; --bg: #fff; --c-bg: #fff; --m-h: 180px; --m-fs: 2rem; --m-c: #fff; }
        body { margin:0; font-family: sans-serif; background-color: var(--bg); min-height: 100vh; transition: background 0.4s; }
        #bg-layer { position:fixed; inset:0; z-index:-1; background-size:cover; background-position:center; transition: 0.5s ease-in-out; }
        #loader { position:fixed; inset:0; background:#fff; display:flex; align-items:center; justify-content:center; z-index:1000; }
        .spin { width:40px; height:40px; border:4px solid #eee; border-top:4px solid #000; border-radius:50%; animation: s 1s linear infinite; }
        @keyframes s { 100% { transform:rotate(360deg); } }
        header { padding: 30px 15px; text-align:center; position:sticky; top:0; z-index:100; }
        #logo-wrap h1 { margin:0; font-size: var(--l-fs, 2rem); color: var(--l-c, #000); font-weight:900; text-transform:uppercase; }
        #logo-wrap img { max-height: 80px; display:block; margin:0 auto; }
        .container { padding:15px; max-width:800px; margin:auto; }
        .m-list { display:flex; flex-direction:column; gap:15px; }
        .m-card { height:var(--m-h); border-radius:25px; overflow:hidden; position:relative; display:flex; align-items:center; justify-content: center; cursor:pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .m-card img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; }
        .m-ov { position:absolute; inset:0; background:rgba(0,0,0,0.4); z-index:2; }
        .m-txt { position:relative; z-index:3; color:var(--m-c); font-size:var(--m-fs); font-weight:900; text-transform:uppercase; }
        .c-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap:15px; }
        .c-card { background: var(--c-bg); border-radius:20px; padding:12px; text-align:center; cursor:pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.06); }
        .c-card img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:15px; margin-bottom:10px; }
        .d-card { background: var(--c-bg); border-radius:18px; padding:15px; display:flex; align-items:center; margin-bottom:12px; }
        .d-img { width:80px; height:80px; object-fit:cover; border-radius:14px; margin-right:15px; }
        .nav-back { display:inline-flex; align-items:center; padding:10px 20px; background:rgba(0,0,0,0.1); border-radius:50px; font-weight:800; margin-bottom:20px; cursor:pointer; }
    </style>
</head>
<body>
    <div id="loader"><div class="spin"></div></div>
    <div id="bg-layer"></div>
    <header><div id="logo-wrap"></div><div id="subt"></div></header>
    <div class="container"><div id="view"></div></div>

<script>
    const SID = new URLSearchParams(window.location.search).get('id');
    let db = [], cfg = {}, st = { m: null, c: null };

    // Pulizia estrema per matchare i parametri
    const normalize = (s) => s ? s.toString().toLowerCase().replace(/[^a-z0-9]/g, '') : '';

    async function loadData() {
        if(!SID) return;
        const ts = Date.now();
        try {
            const [rawC, rawM] = await Promise.all([
                fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Config&v=${ts}`).then(r => r.text()),
                fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Menu&v=${ts}`).then(r => r.text())
            ]);

            // PARSING CONFIG - LOGICA "BRUTA" (Ignora intestazioni, cerca solo coppie chiave-valore)
            const rowsC = rawC.split('\n').map(row => row.split(',').map(cell => cell.replace(/^"|"$/g, '').trim()));
            rowsC.forEach(row => {
                if(row.length >= 2) {
                    const key = normalize(row[0]);
                    const val = row[1];
                    if(key) cfg[key] = val;
                }
            });

            // PARSING MENU
            const rowsM = rawM.split('\n').map(row => row.split(',').map(cell => cell.replace(/^"|"$/g, '').trim()));
            const headM = rowsM[0].map(h => normalize(h));
            db = rowsM.slice(1).map(row => {
                let obj = {};
                headM.forEach((h, i) => obj[h] = row[i]);
                return obj;
            }).filter(i => normalize(i.attivo) === 'si');

            console.log("Configurazione Finale Applicata:", cfg);
            
            applyConfig();
            render();
            document.getElementById('loader').style.display = 'none';
        } catch (e) { console.error("Errore critico:", e); }
    }

    function applyConfig() {
        const s = document.documentElement.style;
        const bg = document.getElementById('bg-layer');
        const lw = document.getElementById('logo-wrap');

        // 1. SFONDO (Forzato)
        const isImage = normalize(cfg.appbgtype) === 'image';
        if(isImage && cfg.appbgimage) {
            bg.style.backgroundImage = `url('${cfg.appbgimage}')`;
            s.setProperty('--bg', 'transparent');
        } else {
            s.setProperty('--bg', cfg.appbgcolor || '#f8f9fa');
            bg.style.backgroundImage = 'none';
        }

        // 2. LOGO / NOME
        if(normalize(cfg.logotype) === 'text') {
            lw.innerHTML = `<h1 onclick="st.m=st.c=null;render()">${cfg.logotext || 'MENU'}</h1>`;
            s.setProperty('--l-c', cfg.logotextcolor || '#000');
            s.setProperty('--l-fs', cfg.logotextsize || '2rem');
        } else if(cfg.logourl) {
            lw.innerHTML = `<img src="${cfg.logourl}" onclick="st.m=st.c=null;render()">`;
        }

        // 3. COLORI E GRANDEZZE
        s.setProperty('--p', cfg.themeprimary || '#000');
        s.setProperty('--c-bg', cfg.cardbg || '#fff');
        s.setProperty('--m-h', cfg.macroheight || '180px');
        s.setProperty('--m-fs', cfg.macrotextsize || '2rem');
        s.setProperty('--m-c', cfg.macrotextcolor || '#fff');
    }

    function render() {
        const view = document.getElementById('view');
        const mode = normalize(cfg.layoutmode);
        view.innerHTML = '';

        if(mode === 'macro' && !st.m) {
            const ms = [...new Set(db.map(i => i.macro).filter(m => m))];
            let html = '<div class="m-list">';
            ms.forEach(m => {
                const img = db.find(i => i.macro === m && i.catfotourl)?.catfotourl || '';
                html += `<div class="m-card" onclick="st.m='${m}';render()"><img src="${img}"><div class="m-ov"></div><span class="m-txt">${m}</span></div>`;
            });
            view.innerHTML = html + '</div>';
        } else if((mode === 'macro' && st.m && !st.c) || (mode !== 'macro' && !st.c)) {
            const filtered = st.m ? db.filter(i => i.macro === st.m) : db;
            const cats = [...new Set(filtered.map(i => i.categoria))];
            let html = st.m ? `<div class="nav-back" onclick="st.m=null;render()">← Menu</div>` : '';
            html += '<div class="c-grid">';
            cats.forEach(c => {
                const img = filtered.find(i => i.categoria === c && i.catfotourl)?.catfotourl || '';
                html += `<div class="c-card" onclick="st.c='${c}';render()"><img src="${img}"><b>${c}</b></div>`;
            });
            view.innerHTML = html + '</div>';
        } else {
            const items = db.filter(i => i.categoria === st.c);
            let html = `<div class="nav-back" onclick="st.c=null;render()">← Indietro</div>`;
            items.forEach(i => {
                html += `<div class="d-card">
                    ${i.fotourl ? `<img src="${i.fotourl}" class="d-img">` : ''}
                    <div>
                        <div style="font-weight:900;">${i.nomeit}</div>
                        <div style="font-size:0.8rem;color:#666;">${i.descit || ''}</div>
                        <div style="color:var(--p);font-weight:900;margin-top:5px;">${i.prezzo}€</div>
                    </div>
                </div>`;
            });
            view.innerHTML = html;
        }
    }
    loadData();
</script>
</body>
</html>
