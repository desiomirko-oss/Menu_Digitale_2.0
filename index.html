<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <title>Smart Menu Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root { --p: #000; --bg: #f8f9fa; --f-main: 'Segoe UI', sans-serif; }
        body { margin:0; font-family: var(--f-main); background: var(--bg); color: #222; }
        #loader { position:fixed; inset:0; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2000; transition: 0.5s; }
        .spin { width:40px; height:40px; border:4px solid #eee; border-top:4px solid var(--p); border-radius:50%; animation: s 1s linear infinite; }
        @keyframes s { 100% { transform:rotate(360deg); } }
        header { padding: 30px 20px; text-align:center; position:sticky; top:0; z-index:100; background:rgba(255,255,255,0.9); backdrop-filter:blur(10px); }
        #logo-wrap img { max-height: 80px; width:auto; }
        .container { padding:15px; max-width:800px; margin:auto; }
        .grid { display:grid; grid-template-columns: 1fr 1fr; gap:15px; }
        .list { display:flex; flex-direction:column; gap:15px; }
        .card-img { height: 180px; border-radius: 20px; overflow:hidden; position:relative; cursor:pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .card-img img { width:100%; height:100%; object-fit:cover; }
        .card-img .ov { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.7), transparent); }
        .card-img span { position:absolute; bottom:15px; left:0; right:0; color:#fff; font-weight:900; text-align:center; text-transform:uppercase; font-size:1.4rem; }
        .dish-card { background:#fff; border-radius:15px; padding:15px; display:flex; margin-bottom:12px; border:1px solid #eee; }
        .dish-img { width:80px; height:80px; object-fit:cover; border-radius:10px; margin-right:15px; }
        .dish-name { font-weight:800; font-size:1.1rem; }
        .dish-price { font-weight:900; color:var(--p); margin-top:5px; }
        .back-nav { display:inline-block; padding:10px 20px; background:#000; color:#fff; border-radius:50px; margin-bottom:20px; cursor:pointer; font-size:12px; font-weight:bold; }
    </style>
</head>
<body>

<div id="loader"><div class="spin"></div><p id="l-msg">Caricamento menu...</p></div>

<header id="h-main">
    <div id="logo-wrap"></div>
    <div id="subt"></div>
</header>

<div class="container">
    <div id="view"></div>
</div>

<script src="app.js"></script>
<script>
    const SID = new URLSearchParams(window.location.search).get('id');
    const LANG = navigator.language.split('-')[0].toLowerCase();
    let db = [], cfg = {}, st = { m: null, c: null };

    const cl = (s) => s ? s.toString().toLowerCase().replace(/[^a-z0-9]/g, '') : '';

    async function translate(text) {
        if (!text || LANG === 'it' || text.length < 2) return text;
        try {
            const res = await axios.get(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=it&tl=${LANG}&dt=t&q=${encodeURI(text)}`);
            return res.data[0][0][0];
        } catch (e) { return text; }
    }

    async function init() {
        if(!SID) { document.getElementById('l-msg').innerText = "ID mancante"; return; }
        try {
            const ts = Date.now();
            const [csvC, csvM] = await Promise.all([
                fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Config&v=${ts}`).then(r => r.text()),
                fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Menu&v=${ts}`).then(r => r.text())
            ]);

            csvC.split('\n').forEach(row => {
                const p = row.split(',').map(c => c.replace(/^"|"$/g, '').trim());
                if(p.length >= 2) cfg[cl(p[0])] = p[1];
            });

            const rowsM = csvM.split('\n').map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
            const headM = rowsM[0].map(h => cl(h));
            db = rowsM.slice(1).map(row => {
                let obj = {};
                headM.forEach((h, i) => obj[h] = row[i]);
                return obj;
            }).filter(i => cl(i.attivo) === 'si');

            if (LANG !== 'it') {
                document.getElementById('l-msg').innerText = "Traduzione...";
                for (let i of db) {
                    i.nomeit = await translate(i.nomeit);
                    i.categoria = await translate(i.categoria);
                    i.macro = await translate(i.macro);
                }
            }

            render();
            document.getElementById('loader').style.display = 'none';
        } catch (e) { 
            console.error(e); 
            document.getElementById('l-msg').innerText = "Errore dati. Controlla il foglio."; 
        }
    }

    function render() {
        const out = document.getElementById('view');
        const lw = document.getElementById('logo-wrap');
        lw.innerHTML = cfg.logourl ? `<img src="${cfg.logourl}" onclick="nav(null,null)">` : `<h1>${cfg.logotext || 'MENU'}</h1>`;
        out.innerHTML = '';

        if (!st.m) {
            const ms = [...new Set(db.map(i => i.macro).filter(Boolean))];
            let h = `<div class="list">`;
            ms.forEach(m => {
                let img = cfg['macroimg' + cl(m)] || db.find(i => i.macro === m)?.fotourl || '';
                h += `<div class="card-img" onclick="nav('${m}', null)"><img src="${img}"><div class="ov"></div><span>${m}</span></div>`;
            });
            out.innerHTML = h + '</div>';
        } else if (!st.c) {
            const cats = [...new Set(db.filter(i => i.macro === st.m).map(i => i.categoria))];
            let h = `<div class="back-nav" onclick="nav(null,null)">← MENU</div><div class="grid">`;
            cats.forEach(c => {
                let img = db.find(i => i.categoria === c)?.fotourl || '';
                h += `<div class="card-img" style="height:120px" onclick="nav('${st.m}', '${c}')"><img src="${img}"><div class="ov"></div><span>${c}</span></div>`;
            });
            out.innerHTML = h + '</div>';
        } else {
            const items = db.filter(i => i.macro === st.m && i.categoria === st.c);
            let h = `<div class="back-nav" onclick="nav('${st.m}',null)">← ${st.c}</div>`;
            items.forEach(i => {
                h += `<div class="dish-card">
                    ${i.fotourl ? `<img src="${i.fotourl}" class="dish-img">` : ''}
                    <div><div class="dish-name">${i.nomeit}</div><div style="font-size:0.8rem;color:#666">${i.descit || ''}</div><div class="dish-price">${i.prezzo}€</div></div>
                </div>`;
            });
            out.innerHTML = h;
        }
    }
    window.nav = (m, c) => { st.m = m; st.c = c; render(); };
    init();
</script>
</body>
</html>
