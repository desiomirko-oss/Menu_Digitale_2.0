<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Navigation PWA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link id="dynamic-font" rel="stylesheet">
    <style>
        :root { --accent: #ffcc00; --bg: #fff; --text-color: #000; }
        body { margin: 0; background-color: var(--bg); color: var(--text-color); transition: 0.3s; font-family: sans-serif; }
        
        #loader { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Navigation Bar */
        header { padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; background: inherit; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .nav-tools { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; min-height: 40px; }
        #btn-back { border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; visibility: hidden; }

        /* Filtri */
        #filter-bar { display: none; justify-content: center; gap: 8px; padding: 10px; overflow-x: auto; }
        .filter-btn { padding: 6px 12px; border: none; border-radius: 15px; font-size: 0.7rem; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: var(--accent) !important; color: #000 !important; }

        /* Container viste */
        .view { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Card Livello 1 e 2 (Grandi Quadrati) */
        .grid-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .nav-card { 
            aspect-ratio: 1/1; border-radius: 20px; display: flex; align-items: center; 
            justify-content: center; text-align: center; font-weight: 900; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 10px; text-transform: uppercase;
        }

        /* Card Piatti */
        .item-card { padding: 18px; border-radius: 18px; margin-bottom: 15px; position: relative; }
        .item-price { font-weight: 900; font-size: 1.2rem; margin-top: 10px; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header>
    <div id="logo-area"></div>
    <div class="nav-tools">
        <button id="btn-back" onclick="goBack()">← Indietro</button>
        <div id="view-title" style="font-weight: bold; font-size: 1.1rem;"></div>
        <div style="width: 40px;"></div> </div>
    <div id="filter-bar"></div>
</header>

<main>
    <div id="view-macro" class="view">
        <div id="macro-grid" class="grid-nav"></div>
    </div>
    <div id="view-cat" class="view">
        <div id="cat-grid" class="grid-nav"></div>
    </div>
    <div id="view-items" class="view">
        <div id="items-list"></div>
    </div>
</main>

<div id="google_translate_element" style="display:none"></div>

<script>
const params = new URLSearchParams(window.location.search);
const ID = params.get('id');
const GID_MENU = "1832483838";

let menuData = [];
let config = {};
let state = { macro: null, cat: null, filters: { 'Senza Glutine': false, 'Vegano': false, 'Analcolico': false } };

async function init() {
    if(!ID) return;
    try {
        const cData = await fetchSheet(0);
        cData.forEach(r => config[r.Parametro] = r.Valore);
        menuData = await fetchSheet(GID_MENU);
        
        applyGlobalStyles();
        
        // Rotta iniziale basata su Layout_Mode
        if(config.Layout_Mode === 'MACRO') showMacro();
        else if(config.Layout_Mode === 'CATEGORIE') showCategories(null);
        else renderUnica();

        document.getElementById('loader').style.display = 'none';
    } catch (e) { console.error(e); }
}

async function fetchSheet(gid) {
    const url = `https://docs.google.com/spreadsheets/d/${ID}/export?format=csv&gid=${gid}&t=${Date.now()}`;
    const res = await fetch(url);
    const text = await res.text();
    return new Promise(resolve => Papa.parse(text, {header:true, skipEmptyLines:true, complete: r => resolve(r.data)}));
}

function applyGlobalStyles() {
    const r = document.documentElement;
    if(config.Font_Main) {
        document.getElementById('dynamic-font').href = `https://fonts.googleapis.com/css2?family=${config.Font_Main.replace(/ /g, '+')}:wght@400;700;900&display=swap`;
        document.body.style.fontFamily = `'${config.Font_Main}', sans-serif`;
    }
    r.style.setProperty('--bg', config.App_Bg_Color || '#fff');
    r.style.setProperty('--accent', config.Filter_Active_Color || '#ffcc00');
    r.style.setProperty('--text-color', config.Logo_Text_Color || '#000');

    const logo = document.getElementById('logo-area');
    logo.innerHTML = config.Logo_Type === 'TEXT' ? `<h1>${config.Logo_Text}</h1>` : `<img src="${config.Logo_URL}" style="max-height:60px">`;
}

// --- LOGICA NAVIGAZIONE ---

function showMacro() {
    switchView('view-macro');
    document.getElementById('btn-back').style.visibility = 'hidden';
    document.getElementById('view-title').innerText = "Menu";
    document.getElementById('filter-bar').style.display = 'none';

    const macros = [...new Set(menuData.map(i => i.Macro))].filter(m => m);
    const grid = document.getElementById('macro-grid');
    grid.innerHTML = macros.map(m => `
        <div class="nav-card" onclick="selectMacro('${m}')" style="background:${config.Filter_BG_Color || '#eee'}; color:${config.Macro_Text_Color || '#000'}; font-size:${config.Macro_Text_Size || '1.2rem'}">
            ${m}
        </div>
    `).join('');
}

function selectMacro(m) {
    state.macro = m;
    showCategories(m);
}

function showCategories(macro) {
    switchView('view-cat');
    document.getElementById('btn-back').style.visibility = 'visible';
    document.getElementById('view-title').innerText = macro || "Categorie";
    document.getElementById('filter-bar').style.display = 'none';

    let filtered = macro ? menuData.filter(i => i.Macro === macro) : menuData;
    const cats = [...new Set(filtered.map(i => i.Categoria))].filter(c => c);
    
    const grid = document.getElementById('cat-grid');
    grid.innerHTML = cats.map(c => `
        <div class="nav-card" onclick="selectCat('${c}')" style="background:${config.Filter_Active_Color || '#ffcc00'}; color:${config.Text_CatTitle_Color || '#fff'}">
            ${c}
        </div>
    `).join('');
}

function selectCat(c) {
    state.cat = c;
    showItems();
}

function showItems() {
    switchView('view-items');
    document.getElementById('btn-back').style.visibility = 'visible';
    document.getElementById('view-title').innerText = state.cat;
    setupFilters();

    let items = menuData.filter(i => i.Categoria === state.cat && i.Attivo === 'SI');
    Object.keys(state.filters).forEach(f => { if(state.filters[f]) items = items.filter(i => i[f] === 'SI'); });

    const list = document.getElementById('items-list');
    list.innerHTML = items.map(i => `
        <div class="item-card" style="background:${config.Card_Bg || '#f9f9f9'}; box-shadow:${config.Show_Cards === 'SI' ? '0 4px 10px rgba(0,0,0,0.1)' : 'none'}">
            <div style="font-weight:900; font-size:1.1rem; color:${config.Logo_Text_Color || '#000'}">${i.Nome_IT}</div>
            <div style="font-size:0.85rem; margin:8px 0; color:${config.Subtitle_Color || '#555'}">${i.Desc_IT || ''}</div>
            <div style="color:${config.Allergen_Color || 'red'}; font-size:0.75rem; font-style:italic">${i.Allerg_IT || ''}</div>
            <div class="item-price" style="color:${config.Filter_Active_Color || '#000'}">€${i.Prezzo}</div>
        </div>
    `).join('');
}

function setupFilters() {
    if(config.Show_Filters !== 'SI') return;
    const bar = document.getElementById('filter-bar');
    bar.style.display = 'flex';
    bar.innerHTML = ['Senza Glutine', 'Vegano', 'Analcolico'].map(f => `
        <button class="filter-btn ${state.filters[f] ? 'active' : ''}" style="background:${config.Filter_BG_Color || '#eee'}" onclick="toggleFilter('${f}')">${f}</button>
    `).join('');
}

function toggleFilter(f) {
    state.filters[f] = !state.filters[f];
    showItems();
}

function goBack() {
    const active = document.querySelector('.view.active').id;
    if(active === 'view-items') showCategories(state.macro);
    else if(active === 'view-cat') showMacro();
}

function switchView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
}

window.onload = init;
</script>
</body>
</html>
