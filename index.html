<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Digitale Premium</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

    <header id="main-header">
        <div id="header-content-wrapper">
            <div id="logo-container" class="w-full flex items-center"></div>
            <div id="subtitle-container"></div>
            <div id="level-title-inside" style="display: none; letter-spacing: 0.1em; text-transform: uppercase;"></div>
        </div>
    </header>

    <div id="sub-header">
        <h2 id="sub-header-title" class="text-[12px] font-black text-gray-500 uppercase tracking-[0.2em] pt-4 px-4 text-center"></h2>
        <div id="sub-header-filters" class="filter-container justify-start sm:justify-center"></div>
    </div>

    <button id="back-button" onclick="goBack()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>

    <main id="main-content" class="px-5 pb-10 max-w-md mx-auto relative">
        <div id="loading-screen" class="flex flex-col items-center pt-20">
            <div class="loader mb-4"></div>
            <p class="text-gray-400 text-sm uppercase tracking-widest mt-2" id="loading-text">Sincronizzazione...</p>
        </div>

        <div id="level-title-outside" style="display: none; letter-spacing: 0.1em; text-transform: uppercase;" class="mb-4"></div>

        <section id="page-macro" style="display: none;"><div id="macro-layout-container" class="page-content"></div></section>
        <section id="page-categories" style="display: none;" class="page-content space-y-4"></section>
        <section id="page-items" style="display: none;" class="page-content space-y-4"></section>
    </main>

    <script src="app.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('SW registrato:', reg.scope);
                }).catch(err => console.log('SW errore:', err));
            });
        }
    </script>
</body>
</html>
