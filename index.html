<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Menu PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link id="google-font" rel="stylesheet">
    <style>
        body { transition: background 0.3s ease; }
        .macro-card { height: var(--macro-height, 200px); background-size: cover; background-position: center; }
        .loader-spin { border-top-color: var(--loader-color, #000); animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white">
        <div class="loader-spin rounded-full border-4 h-16 w-16 mb-4"></div>
        <p id="loader-text">Sincronizzazione Menu...</p>
    </div>

    <header class="p-6 text-center">
        <div id="logo-container" class="flex justify-center mb-2"></div>
        <h2 id="app-subtitle" class="uppercase tracking-widest"></h2>
    </header>

    <nav id="nav-bar" class="px-4 py-2 hidden">
        <button onclick="renderMacro()" class="text-sm font-bold text-gray-500 uppercase">← Torna Indietro</button>
    </nav>

    <main id="app-content" class="max-w-2xl mx-auto p-4 space-y-4">
        </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sheetId = urlParams.get('id');
        
        let config = {};
        let menuData = [];
        let currentMacro = null;

        async function init() {
            if (!sheetId) {
                alert("ID Foglio mancante nell'URL!");
                return;
            }
            await loadData();
            applyConfig();
            renderMacro();
            
            // Nascondi loader con il delay del tuo sheet
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, parseInt(config.Loader_Time) || 1000);
        }

        async function loadData() {
            // Carichiamo entrambi i fogli (Config e Menu)
            // Nota: assumiamo che Config sia il primo foglio (gid=0) e Menu il secondo, 
            // ma l'approccio migliore per GitHub è usare il nome del foglio se pubblicato correttamente
            const configUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Config`;
            const menuUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Menu`;

            try {
                const [confRes, menuRes] = await Promise.all([fetch(configUrl), fetch(menuUrl)]);
                const confCsv = await confRes.text();
                const menuCsv = await menuRes.text();

                // Parsing Config
                confCsv.split('\n').slice(1).forEach(row => {
                    const [param, valore] = row.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
                    if (param) config[param.trim()] = valore ? valore.replace(/"/g, '').trim() : '';
                });

                // Parsing Menu
                const rows = menuCsv.split('\n').map(r => r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(c => c.replace(/"/g, '')));
                const headers = rows[0];
                menuData = rows.slice(1).map(row => {
                    let obj = {};
                    headers.forEach((h, i) => obj[h.trim()] = row[i]);
                    return obj;
                });
            } catch (e) { console.error("Errore download:", e); }
        }

        function applyConfig() {
            const root = document.documentElement;
            // Font
            if (config.Font_Main) {
                document.getElementById('google-font').href = `https://fonts.googleapis.com/css2?family=${config.Font_Main.replace(/ /g, '+')}:wght@400;700&display=swap`;
                document.body.style.family = config.Font_Main;
            }
            
            // Sfondo
            if (config.App_Bg_Type === 'color') document.body.style.backgroundColor = config.App_Bg_Color;
            else {
                document.body.style.backgroundImage = `url(${config.App_Bg_Image})`;
                document.body.style.backgroundSize = config.App_Bg_Size;
                document.body.style.backgroundPosition = config.App_Bg_Pos;
            }

            // Logo
            const logoCont = document.getElementById('logo-container');
            if (config.Logo_Type === 'IMAGE') {
                logoCont.innerHTML = `<img src="${config.Logo_URL}" style="width: ${config.Logo_Img_Size}">`;
            } else {
                logoCont.innerHTML = `<h1 style="color: ${config.Logo_Text_Color}; font-size: ${config.Logo_Text_Size}">${config.Logo_Text}</h1>`;
            }

            document.getElementById('app-subtitle').innerText = config.App_Subtitle;
            document.getElementById('app-subtitle').style.color = config.Subtitle_Color;
            
            // Variabili CSS per loader e macro
            root.style.setProperty('--loader-color', config.Loader_Time_Color);
            root.style.setProperty('--macro-height', config.Macro_Height);
        }

        // LIVELLO 1: MACRO
        function renderMacro() {
            document.getElementById('nav-bar').classList.add('hidden');
            const container = document.getElementById('app-content');
            container.innerHTML = `<div class="grid grid-cols-1 gap-4">
                <div onclick="renderCategories('CIBO')" class="macro-card flex items-center justify-center rounded-2xl shadow-lg cursor-pointer" style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url(${config.Macro_Img_Cibo})">
                    <span style="color: ${config.Macro_Text_Color}; font-size: ${config.Macro_Text_Size}" class="font-bold uppercase">Cibo</span>
                </div>
                <div onclick="renderCategories('BEVANDE')" class="macro-card flex items-center justify-center rounded-2xl shadow-lg cursor-pointer" style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url(${config.Macro_Img_Bevande})">
                    <span style="color: ${config.Macro_Text_Color}; font-size: ${config.Macro_Text_Size}" class="font-bold uppercase">Bevande</span>
                </div>
            </div>`;
        }

        // LIVELLO 2: CATEGORIE
        function renderCategories(macro) {
            currentMacro = macro;
            document.getElementById('nav-bar').classList.remove('hidden');
            const container = document.getElementById('app-content');
            
            const categories = [...new Set(menuData.filter(item => item.Macro === macro).map(item => item.Categoria))];
            
            container.innerHTML = `<div class="grid gap-3">`;
            categories.forEach(cat => {
                container.innerHTML += `
                    <button onclick="renderItems('${cat}')" class="w-full p-6 bg-white rounded-xl shadow-sm border text-left flex justify-between items-center group active:scale-95 transition-transform">
                        <span class="text-xl font-bold" style="color: ${config.Text_CatTitle_Color}">${cat}</span>
                        <span class="text-gray-400 group-hover:translate-x-2 transition-transform">→</span>
                    </button>`;
            });
            container.innerHTML += `</div>`;
        }

        // LIVELLO 3: PRODOTTI
        function renderItems(category) {
            const container = document.getElementById('app-content');
            const items = menuData.filter(item => item.Categoria === category && item.Attivo === 'SI');
            
            container.innerHTML = `<div class="space-y-4">
                <button onclick="renderCategories('${currentMacro}')" class="text-blue-500 font-bold mb-2">← Torna alle categorie</button>
            `;
            
            items.forEach(item => {
                const isGlutenFree = item['Senza Glutine'] === 'SI' ? '🌾🚫' : '';
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-lg">${item.Nome_IT} ${isGlutenFree}</h3>
                            <span class="font-bold text-blue-600">${item.Prezzo}€</span>
                        </div>
                        <p class="text-gray-500 text-sm mt-1">${item.Desc_IT}</p>
                        ${item.Allerg_IT ? `<p class="text-xs text-red-400 mt-2 italic">Allergeni: ${item.Allerg_IT}</p>` : ''}
                    </div>`;
            });
            container.innerHTML += `</div>`;
        }

        window.onload = init;
    </script>
</body>
</html>
