<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Divino PWA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link id="dynamic-fonts" rel="stylesheet">

    <style>
        :root { --accent: #f4fc03; --bg: #ffffff; --card: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { min-height: 100vh; background-attachment: fixed; transition: 0.3s; overflow-x: hidden; font-family: sans-serif; }

        #loader { position: fixed; inset: 0; z-index: 10000; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(0,0,0,0.1); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px;}
        #loader-text { font-weight: bold; color: #333; }
        @keyframes spin { to { transform: rotate(360deg); } }

        header { padding: 20px 15px 5px; text-align: center; position: sticky; top: 0; z-index: 1000; background: inherit; }
        #app-logo img { transition: 0.3s; margin: 0 auto; display: block; }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 10px auto; padding: 0 15px; min-height: 40px; }
        #btn-back { border: none; padding: 10px 18px; border-radius: 12px; font-weight: 900; cursor: pointer; visibility: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.15); text-transform: uppercase; }

        .view { display: none; padding: 15px; max-width: 800px; margin: 0 auto; animation: fadeInUp 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .list { display: flex; flex-direction: column; gap: 15px; }

        .c-macro { 
            border-radius: 20px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
            background-size: cover; background-position: center; box-shadow: 0 6px 20px rgba(0,0,0,0.2); cursor: pointer; background-color: #333;
        }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
        .c-label { position: relative; z-index: 2; font-weight: 900; text-transform: uppercase; text-align: center; padding: 10px; }

        .p-card { padding: 18px; border-radius: 22px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); background: var(--card); }
        .p-img { width: 100%; border-radius: 15px; margin-bottom: 12px; object-fit: cover; }

        #filter-bar { display: none; gap: 10px; justify-content: center; padding: 10px; overflow-x: auto; margin-bottom: 5px; }
        .f-btn { padding: 8px 16px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; white-space: nowrap; }

        #btn-top { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; border: none; display: none; align-items: center; justify-content: center; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 20px;}
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="loader-text">Connessione ai Dati Celesti...</div>
</div>

<header id="main-header">
    <div id="app-logo"></div>
    <div id="app-subtitle"></div>
    <div class="nav-bar">
        <button id="btn-back" onclick="goBack()">← INDIETRO</button>
        <div id="v-title" style="font-weight: 900; text-transform: uppercase; letter-spacing: 1px;"></div>
        <div style="width:60px"></div>
    </div>
    <div id="filter-bar"></div>
</header>

<main>
    <div id="v-macro" class="view"></div>
    <div id="v-cat" class="view"></div>
    <div id="v-items" class="view"></div>
</main>

<button id="btn-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

<script src="app.js"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const SHEET_ID = urlParams.get('id');
    const GID_MENU = "1832483838"; 

    let db = [], cfg = {}, state = { step: 'macro', m: null, c: null, filters: {} };

    // IL MOTORE FUZZY: Ignora maiuscole, spazi e caratteri strani
    const fz = (str) => (str || "").toString().toLowerCase().replace(/[^a-z0-9]/g, '');
    const isYes = (s) => ["si", "sì", "yes"].includes(fz(s));
    
    // Recupero Dati Blindato
    function getC(key, def = '') {
        const foundKey = Object.keys(cfg).find(k => fz(k) === fz(key));
        return (foundKey && cfg[foundKey] !== '') ? cfg[foundKey] : def;
    }
    function getM(row, key, def = '') {
        const foundKey = Object.keys(row).find(k => fz(k) === fz(key));
        return (foundKey && row[foundKey] !== '') ? row[foundKey] : def;
    }

    async function init() {
        if(!SHEET_ID) { document.getElementById('loader-text').innerText = "ERRORE: Manca ID Google Sheet nell'URL!"; return; }
        
        // Failsafe Timer
        const failSafe = setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            alert("Il caricamento sta impiegando troppo. Verifica l'ID del foglio o la connessione.");
        }, 8000);

        try {
            const [rawCfg, rawMenu] = await Promise.all([fetchCSV(0), fetchCSV(GID_MENU)]);
            
            rawCfg.forEach(r => { if(getM(r, 'Parametro')) cfg[getM(r, 'Parametro')] = getM(r, 'Valore'); });
            db = rawMenu;

            clearTimeout(failSafe);
            setupApp();
        } catch(e) { 
            clearTimeout(failSafe);
            console.error(e);
            document.getElementById('loader-text').innerText = "Errore di Rete o Dati non validi.";
        }
    }

    async function fetchCSV(gid) {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}&t=${Date.now()}`;
        const res = await fetch(url);
        if(!res.ok) throw new Error("Fetch failed");
        const text = await res.text();
        return new Promise(res => Papa.parse(text, {header:true, skipEmptyLines:true, complete: o => res(o.data)}));
    }

    function setupApp() {
        const root = document.documentElement;
        const body = document.body;
        
        root.style.setProperty('--bg', getC('App_Bg_Color', '#e8e8e8'));
        root.style.setProperty('--accent', getC('Filter_Active_Color', '#f4fc03'));
        root.style.setProperty('--card', getC('Card_Bg', '#ffffff'));

        if(getC('App_Bg_Type').toUpperCase() === 'IMAGE' && getC('App_Bg_Image')) {
            body.style.background = `url('${getC('App_Bg_Image')}') ${getC('App_Bg_Pos', 'center')} / ${getC('App_Bg_Size', 'cover')} no-repeat fixed`;
        } else {
            body.style.backgroundColor = getC('App_Bg_Color', '#e8e8e8');
        }

        const font = getC('Font_Main', 'Montserrat');
        document.getElementById('dynamic-fonts').href = `https://fonts.googleapis.com/css2?family=${font.replace(/ /g,'+')}:wght@400;700;900&display=swap`;
        body.style.fontFamily = `'${font}', sans-serif`;

        const logoDiv = document.getElementById('app-logo');
        if(getC('Logo_Type').toUpperCase() === 'IMAGE' && getC('Logo_URL')) {
            const lSize = getC('Logo_Img_Size', '120px');
            logoDiv.innerHTML = `<img src="${getC('Logo_URL')}" style="width:${lSize}; height:auto;">`;
        } else {
            logoDiv.innerHTML = `<h1 style="color:${getC('Logo_Text_Color')}; font-size:${getC('Logo_Text_Size', '2rem')}">${getC('Logo_Text', 'MENU')}</h1>`;
        }

        const sub = document.getElementById('app-subtitle');
        sub.innerText = getC('App_Subtitle', '');
        sub.style.cssText = `color:${getC('Subtitle_Color')}; font-size:${getC('Subtitle_Size')}; display:${isYes(getC('Show_Subtitle'))?'block':'none'}; margin-top:${getC('Subtitle_Margin')}; text-align:${getC('Subtitle_Align')}; font-family:'${getC('Subtitle_Font', font)}'`;

        document.getElementById('btn-top').style.background = getC('Btn_Top_Bg', '#fff');
        document.getElementById('btn-top').style.color = getC('Btn_Top_Simbol_Color', '#000');

        const mode = getC('Layout_Mode', 'MACRO').toUpperCase();
        if(mode === 'CATEGORIE') { state.step = 'cat'; renderCat(true); }
        else if(mode === 'UNICA') { state.step = 'items'; renderItems(true); }
        else { state.step = 'macro'; renderMacro(); }

        setTimeout(() => document.getElementById('loader').style.display = 'none', parseInt(getC('Loader_Time', '1000')));
    }

    function renderMacro() {
        switchView('v-macro');
        const macros = [...new Set(db.map(i => getM(i, 'Macro')))].filter(Boolean);
        const container = document.getElementById('v-macro');
        container.className = `view active ${getC('Macro_Layout') === 'GRID' ? 'grid' : 'list'}`;
        
        container.innerHTML = macros.map(m => {
            const isBev = m.toUpperCase().includes('BEV');
            const img = isBev ? getC('Macro_Img_Bevande') : getC('Macro_Img_Cibo');
            return `
            <div class="c-macro" onclick="selectM('${m}')" style="height:${getC('Macro_Height', '200px')}; background-image:url('${img}')">
                <div class="overlay"></div>
                <div class="c-label" style="color:${getC('Macro_Text_Color')}; font-size:${getC('Macro_Text_Size')}">${m}</div>
            </div>`;
        }).join('');
    }

    function selectM(m) { state.m = m; state.step = 'cat'; renderCat(); }

    function renderCat(all = false) {
        switchView('v-cat');
        let filtered = all ? db : db.filter(i => getM(i, 'Macro') === state.m);
        const cats = [...new Set(filtered.map(i => getM(i, 'Categoria')))].filter(Boolean);
        const container = document.getElementById('v-cat');
        container.className = `view active ${getC('Cat_Layout') === 'GRID' ? 'grid' : 'list'}`;

        container.innerHTML = cats.map(c => {
            const item = filtered.find(i => getM(i, 'Categoria') === c);
            const img = isYes(getC('Cat_Img_Show')) ? getM(item, 'Cat_Img') : '';
            return `
            <div class="c-macro" onclick="selectC('${c}')" style="height:120px; background-image:url('${img}'); background-color:${getC('Filter_Active_Color', '#333')}">
                ${img ? '<div class="overlay"></div>' : ''}
                <div class="c-label" style="color:${getC('Text_CatTitle_Color', '#fff')}">${c}</div>
            </div>`;
        }).join('');
    }

    function selectC(c) { state.c = c; state.step = 'items'; renderItems(); }

    function renderItems(all = false) {
        switchView('v-items');
        const container = document.getElementById('v-items');
        
        let list = all ? db : db.filter(i => getM(i, 'Categoria') === state.c && isYes(getM(i, 'Attivo', 'SI')));
        const first = list[0] || {};
        container.className = `view active ${getM(first, 'Cat_Layout', getC('Cat_Layout')) === 'GRID' ? 'grid' : 'list'}`;

        const fb = document.getElementById('filter-bar');
        const isBev = (state.m || "").toUpperCase().includes('BEV');
        const fKeys = isBev ? ['Analcolico'] : ['Senza Glutine', 'Vegano'];
        
        fb.innerHTML = fKeys.map(f => `<button class="f-btn" onclick="togF('${f}')" style="background:${state.filters[f] ? getC('Filter_Active_Color') : '#ddd'}; color:${state.filters[f] ? getC('Filter_Text_Color') : '#333'}">${f}</button>`).join('');
        fb.style.display = isYes(getC('Show_Filters', 'SI')) ? 'flex' : 'none';

        Object.keys(state.filters).forEach(f => { if(state.filters[f]) list = list.filter(i => isYes(getM(i, f))); });

        container.innerHTML = list.map(i => `
            <div class="p-card">
                ${getM(i, 'Foto_URL') ? `<img src="${getM(i, 'Foto_URL')}" class="p-img">` : ''}
                <div style="font-weight:900; font-size:1.2rem; color:${getC('Card_Name_Color', '#000')}">${getM(i, 'Nome_IT')}</div>
                <div style="font-size:0.9rem; color:${getC('Card_Desc_Color', '#666')}; margin:8px 0; line-height:1.4">${getM(i, 'Desc_IT')}</div>
                <div style="color:${getC('Price_Color', '#000')}; font-size:${getC('Price_Size', '1.1rem')}; font-weight:900; text-align:${getC('Price_Align', 'left')}">€${getM(i, 'Prezzo')}</div>
                ${getM(i, 'Modello_3d') ? `<button class="f-btn" style="background:#000; color:#fff; width:100%; margin-top:15px;" onclick="window.open('${getM(i, 'Modello_3d')}')">📦 VISUALIZZA IN 3D</button>` : ''}
            </div>`).join('');
    }

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        const mode = getC('Layout_Mode', 'MACRO').toUpperCase();
        const btn = document.getElementById('btn-back');
        const title = document.getElementById('v-title');

        let showBack = false;
        if(mode === 'MACRO') showBack = (id !== 'v-macro');
        else if(mode === 'CATEGORIE') showBack = (id === 'v-items');
        else showBack = false;

        btn.style.visibility = showBack ? 'visible' : 'hidden';
        btn.style.background = getC('Btn_Back_Bg', '#000');
        btn.style.color = getC('Btn_Back_Text', '#fff');

        title.innerText = (id === 'v-cat') ? state.m : (id === 'v-items' ? state.c : '');
        document.getElementById('filter-bar').style.display = (id === 'v-items' && isYes(getC('Show_Filters', 'SI'))) ? 'flex' : 'none';
        window.scrollTo(0,0);
    }

    function goBack() {
        const mode = getC('Layout_Mode', 'MACRO').toUpperCase();
        if(state.step === 'items') {
            state.step = 'cat';
            renderCat(mode === 'CATEGORIE');
        } else if(state.step === 'cat') {
            state.step = 'macro';
            renderMacro();
        }
    }

    function togF(f) { state.filters[f] = !state.filters[f]; renderItems(getC('Layout_Mode').toUpperCase() === 'UNICA'); }
    window.onscroll = () => document.getElementById('btn-top').style.display = window.scrollY > 300 ? 'flex' : 'none';
    window.onload = init;
</script>
</body>
</html>
