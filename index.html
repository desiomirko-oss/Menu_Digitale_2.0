<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Menu Master V5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Variabili Root popolate dal Config */
        :root {
            --app-bg: #f3f4f6;
            --app-bg-image: none;
            --app-bg-size: cover;
            --app-bg-pos: center;
            
            --header-bg: rgba(255, 255, 255, 0.8);
            --header-height: 100px;
            
            --sub-font: sans-serif;
            --sub-color: #6b7280;
            --sub-size: 14px;
            --sub-weight: normal;
            --sub-align: center;
            --sub-mt: 10px; /* Nuova variabile spazio */

            --logo-font: sans-serif;
            --logo-color: #000;
            --logo-size: 24px;
            --logo-weight: bold;
            --logo-align: center;
            --logo-img-size: 50px;
        }

        body {
            background-color: var(--app-bg);
            background-image: var(--app-bg-image);
            background-size: var(--app-bg-size);
            background-position: var(--app-bg-pos);
            background-attachment: fixed; 
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .glass-header {
            background: var(--header-bg);
            height: var(--header-height);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .dynamic-subtitle {
            font-family: var(--sub-font);
            color: var(--sub-color);
            font-size: var(--sub-size);
            font-weight: var(--sub-weight);
            text-align: var(--sub-align);
            margin-top: var(--sub-mt); /* Il margine ora è controllato da Sheet */
        }

        .dynamic-logo-text {
            font-family: var(--logo-font);
            color: var(--logo-color);
            font-size: var(--logo-size);
            font-weight: var(--logo-weight);
            text-align: var(--logo-align);
            line-height: 1; /* Rimuove spaziature extra di default del testo */
        }

        .dynamic-logo-img {
            height: var(--logo-img-size);
            object-fit: contain;
        }

        .page-transition { display: none; }
        .active-page { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header id="main-header" class="glass-header px-6">
        <button id="back-button" onclick="goBack()" class="absolute left-4 hidden bg-white/50 p-2 rounded-full shadow-sm z-20">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <div id="header-content" class="flex flex-col w-full">
            <div id="logo-container" class="w-full flex"></div>
            <div id="subtitle-container" class="dynamic-subtitle"></div>
        </div>
    </header>

    <main id="main-content" class="px-4 pb-12 max-w-md mx-auto">
        <div id="loading-screen" class="flex flex-col items-center pt-40">
            <div class="loader mb-4"></div>
            <p id="loading-text" class="text-gray-500 font-medium bg-white/80 px-4 py-2 rounded-full">Caricamento...</p>
        </div>

        <section id="page-macro" class="page-transition space-y-4"></section>
        <section id="page-categories" class="page-transition space-y-4"></section>
        <section id="page-items" class="page-transition space-y-6"></section>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const SHEET_ID = urlParams.get('id'); 
        
        let fullData = [];
        let appConfig = {};
        let navigationStack = ['page-macro'];

        async function init() {
            if (!SHEET_ID) {
                document.getElementById('loading-screen').innerHTML = "<p class='bg-red-100 p-4 rounded text-red-700'>ID Cliente mancante nell'URL.</p>";
                return;
            }
            await fetchConfig();
            applyConfig();
            await fetchMenu();
        }

        async function fetchConfig() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=config`;
            const response = await fetch(url);
            const csv = await response.text();
            csv.split('\n').slice(1).forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
                if(cols.length >= 2) {
                    const key = cols[0].replace(/"/g, '').trim();
                    const val = cols[1].replace(/"/g, '').replace(/;/g, ',').trim();
                    appConfig[key] = val;
                }
            });
        }

        function applyConfig() {
            const root = document.documentElement;
            
            // Sfondo
            if(appConfig.Bg_Type === 'image') {
                root.style.setProperty('--app-bg-image', `url('${appConfig.Bg_Image_URL}')`);
                root.style.setProperty('--app-bg-size', appConfig.Bg_Image_Size || 'cover');
                root.style.setProperty('--app-bg-pos', appConfig.Bg_Image_Pos || 'center');
            } else {
                root.style.setProperty('--app-bg', appConfig.Bg_Color || '#f3f4f6');
            }

            // Header
            root.style.setProperty('--header-bg', appConfig.Header_BgColor || 'rgba(255,255,255,0.8)');
            root.style.setProperty('--header-height', appConfig.Header_Height || '100px');
            document.getElementById('main-content').style.paddingTop = `calc(${appConfig.Header_Height} + 20px)`;

            // Logo
            const logoCont = document.getElementById('logo-container');
            logoCont.className = `w-full flex justify-${appConfig.Logo_Align || 'center'}`;
            if(appConfig.Logo_Type === 'image') {
                root.style.setProperty('--logo-img-size', appConfig.Logo_Image_Size || '50px');
                logoCont.innerHTML = `<img src="${appConfig.Logo_Image_URL}" class="dynamic-logo-img">`;
            } else {
                root.style.setProperty('--logo-font', appConfig.Logo_Text_Font);
                root.style.setProperty('--logo-color', appConfig.Logo_Text_Color);
                root.style.setProperty('--logo-size', appConfig.Logo_Text_Size);
                root.style.setProperty('--logo-weight', appConfig.Logo_Text_Bold === 'TRUE' ? 'bold' : 'normal');
                logoCont.innerHTML = `<h1 class="dynamic-logo-text">${appConfig.Logo_Text}</h1>`;
            }

            // Sottotitolo e Spaziatura
            document.getElementById('subtitle-container').innerText = appConfig.Subtitle_Text;
            root.style.setProperty('--sub-font', appConfig.Subtitle_Font);
            root.style.setProperty('--sub-color', appConfig.Subtitle_Color);
            root.style.setProperty('--sub-size', appConfig.Subtitle_Size);
            root.style.setProperty('--sub-weight', appConfig.Subtitle_Bold === 'TRUE' ? 'bold' : 'normal');
            root.style.setProperty('--sub-align', appConfig.Subtitle_Align);
            root.style.setProperty('--sub-mt', appConfig.Subtitle_Margin_Top || '0px'); /* Applica lo spazio */
        }

        // --- Logica Menu ---
        async function fetchMenu() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=menu`;
            try {
                const response = await fetch(url);
                const csvData = await response.text();
                const rows = csvData.split('\n').slice(1);
                fullData = rows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                    return { macro: c[0], cat: c[1], name: c[2], desc: c[3], price: c[4] };
                }).filter(i => i.macro);
                
                document.getElementById('loading-screen').classList.add('hidden');
                renderMacro();
            } catch(e) {
                // Gestione errore silenziosa se il menu non è ancora pronto
                document.getElementById('loading-text').innerText = "Menu in allestimento...";
            }
        }

        function renderMacro() {
            const container = document.getElementById('page-macro');
            const macros = [...new Set(fullData.map(i => i.macro))];
            container.innerHTML = `<h2 class="text-xl font-bold mb-4 px-2 text-gray-800">Menu</h2>`;
            macros.forEach(m => {
                container.innerHTML += `<div onclick="renderCategories('${m}')" class="bg-white/90 backdrop-blur p-6 rounded-2xl shadow-sm border border-white/50 flex justify-between items-center cursor-pointer active:scale-95 transition-all"><span class="text-lg font-bold">${m}</span><span>→</span></div>`;
            });
            showPage('page-macro');
        }

        function renderCategories(mName) {
            const container = document.getElementById('page-categories');
            const cats = [...new Set(fullData.filter(i => i.macro === mName).map(i => i.cat))];
            container.innerHTML = `<h2 class="text-xl font-bold mb-4 px-2 text-gray-800">${mName}</h2>`;
            cats.forEach(c => {
                container.innerHTML += `<div onclick="renderItems('${c}')" class="bg-white/90 p-5 rounded-xl shadow-sm flex justify-between items-center cursor-pointer"><span>${c}</span><span class="text-indigo-600">Apri</span></div>`;
            });
            navigationStack.push('page-categories');
            showPage('page-categories');
        }

        function renderItems(cName) {
            const container = document.getElementById('page-items');
            const items = fullData.filter(i => i.cat === cName);
            container.innerHTML = `<h2 class="text-xl font-bold mb-4 px-2 text-gray-800">${cName}</h2>`;
            items.forEach(i => {
                container.innerHTML += `<div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-2"><div class="flex justify-between items-start gap-4"><h3 class="font-bold text-gray-900">${i.name}</h3><span class="font-bold text-indigo-600">${i.price}</span></div><p class="text-sm text-gray-500">${i.desc}</p></div>`;
            });
            navigationStack.push('page-items');
            showPage('page-items');
        }

        function showPage(p) {
            document.querySelectorAll('.page-transition').forEach(el => el.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
            document.getElementById('back-button').classList.toggle('hidden', p === 'page-macro');
            window.scrollTo(0,0);
        }

        function goBack() { navigationStack.pop(); showPage(navigationStack[navigationStack.length-1]); }

        init();
    </script>
</body>
</html>
